<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGame Launcher</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0D0D12;
            background-image: radial-gradient(circle at top left, rgba(109, 40, 217, 0.15), transparent 50%),
                              radial-gradient(circle at bottom right, rgba(109, 40, 217, 0.05), transparent 50%);
            color: #FFFFFF;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background-color: #1A1A24;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            margin: 0 0 15px 0;
            color: #A78BFA; /* Cor sólida em vez de degradê transparente para evitar bugs */
        }

        p {
            font-size: 1.1rem;
            color: #A0A0A8;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .badge {
            background-color: rgba(109, 40, 217, 0.2);
            border: 1px solid rgba(109, 40, 217, 0.5);
            color: #C4B5FD;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            background-color: #6D28D9;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: #5B21B6;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>GGame Launcher</h1>
        <p>Um launcher minimalista, elegante e focado em imersão para sua biblioteca de jogos no Windows.</p>
        
        <div class="features">
            <span class="badge">Desenvolvido em Flutter</span>
            <span class="badge">Navegação via Gamepad</span>
            <span class="badge">Diário Integrado</span>
        </div>

        <a href="https://github.com/" class="btn">Ver Repositório</a>
    </div>

</body>
</html>
